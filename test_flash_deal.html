<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Flash Deal</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5vh;
    padding: 4vh 5vw;
    border-radius: 22px;
    background: rgba(0, 0, 0, 0.6);
    box-shadow:
      0 0 20px rgba(0,255,204,0.15),
      0 0 60px rgba(0,255,204,0.08);
  }

  /* ===== アイコン ===== */
  .icon-wrap {
    width: 35vw;
    max-width: 220px;
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(0,255,204,0.25);
  }

  .bag-icon {
    width: 65%;
    height: 65%;
    stroke: #00ffcc;
    stroke-width: 2.2;
    fill: none;
    filter: drop-shadow(0 0 6px rgba(0,255,204,0.6));
  }

  /* ===== 金額表示 ===== */
  .price-box {
    text-align: center;
    color: #00ffcc;
  }

  .current-price {
    font-size: 4vw;
    font-weight: 700;
    text-shadow:
      0 0 10px rgba(0,255,204,0.4),
      0 0 30px rgba(0,255,204,0.2);
  }

  .list-price {
    font-size: 2vw;
    color: rgba(0,255,204,0.6);
    text-decoration: line-through;
    margin-top: 0.6vh;
  }

  .discount {
    margin-top: 1vh;
    font-size: 2.5vw;
    font-weight: 600;
    color: #00ffcc;
    text-shadow:
      0 0 10px rgba(0,255,204,0.4);
  }

  @media (max-width: 600px) {
    .current-price { font-size: 10vw; }
    .list-price { font-size: 4vw; }
    .discount { font-size: 6vw; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- バッグアイコン -->
  <div class="icon-wrap">
    <svg class="bag-icon" viewBox="0 0 24 24">
      <path d="M6 8h12l-1 12H7L6 8Z"/>
      <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
    </svg>
  </div>

  <!-- 金額表示 -->
  <div class="price-box">
    <div class="current-price" id="currentPrice">¥ --</div>
    <div class="list-price" id="listPrice">¥ --</div>
    <div class="discount" id="discountRate">--% OFF</div>
  </div>

</div>

<script>
  // ===== 設定 =====
  const LIST_PRICE = 12000; // 定価（円）
  const MIN_DISCOUNT = 0;
  const MAX_DISCOUNT = 50;

  // ===== 時刻シード疑似乱数 =====
  function seededRandom(seed) {
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  const seed = Date.now(); // アクセス時刻
  const rand = seededRandom(seed);

  const discount = Math.floor(
    MIN_DISCOUNT + rand * (MAX_DISCOUNT - MIN_DISCOUNT + 1)
  );

  const currentPrice = Math.floor(
    LIST_PRICE * (1 - discount / 100)
  );

  // ===== 表示 =====
  document.getElementById("listPrice").textContent = `¥ ${LIST_PRICE.toLocaleString()}`;
  document.getElementById("currentPrice").textContent = `¥ ${currentPrice.toLocaleString()}`;
  document.getElementById("discountRate").textContent = `${discount}% OFF`;
</script>

</body>
</html>
