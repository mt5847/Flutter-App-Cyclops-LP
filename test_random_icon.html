<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Random Icon</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-card {
    width: 60vmin;
    height: 60vmin;
    max-width: 360px;
    max-height: 360px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    box-shadow:
      0 0 25px rgba(0,255,204,0.2),
      0 0 70px rgba(0,255,204,0.1);
  }

  .icon {
    width: 70%;
    height: 70%;
    stroke: #00ffcc;
    stroke-width: 2.2;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(0,255,204,0.6));
  }
</style>
</head>
<body>

<div class="icon-card" id="iconBox"></div>

<script>
  // ===== SVGアイコン定義（10種）=====
  const icons = [
    // 0: バッグ
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M6 8h12l-1 12H7L6 8Z"/>
      <path d="M9 8V6a3 3 0 0 1 6 0v2"/>
    </svg>`,

    // 1: 時計
    `<svg class="icon" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 7v6l4 2"/>
    </svg>`,

    // 2: カメラ
    `<svg class="icon" viewBox="0 0 24 24">
      <rect x="3" y="7" width="18" height="12" rx="2"/>
      <circle cx="12" cy="13" r="3"/>
      <path d="M8 7l1.5-2h5L16 7"/>
    </svg>`,

    // 3: 星
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M12 3l3 6 6 .8-4.5 4.3 1.2 6L12 17l-5.7 3.1 1.2-6L3 9.8 9 9l3-6Z"/>
    </svg>`,

    // 4: ハート
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M12 21s-7-4.5-9-8.5C1 8 3.5 5 7 5c2 0 3.5 1 5 3 1.5-2 3-3 5-3 3.5 0 6 3 4 7.5C19 16.5 12 21 12 21Z"/>
    </svg>`,

    // 5: 家
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M3 11l9-7 9 7"/>
      <path d="M5 10v10h14V10"/>
      <path d="M9 20v-6h6v6"/>
    </svg>`,

    // 6: 炎
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M12 3s4 4 4 8a4 4 0 0 1-8 0c0-2 1-3 2-5 0 2 2 3 2 5 1-2 0-4 0-8Z"/>
    </svg>`,

    // 7: 音楽
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M9 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
      <path d="M17 16a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
      <path d="M9 14V6l10-2v8"/>
    </svg>`,

    // 8: 雷
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M13 2L4 14h6l-1 8 9-12h-6l1-8Z"/>
    </svg>`,

    // 9: チャット
    `<svg class="icon" viewBox="0 0 24 24">
      <path d="M4 4h16v12H7l-3 4V4Z"/>
      <circle cx="9" cy="10" r="1"/>
      <circle cx="12" cy="10" r="1"/>
      <circle cx="15" cy="10" r="1"/>
    </svg>`
  ];

  // ===== 秒数ベース選択 =====
  const now = new Date();
  const sec = now.getSeconds();   // 0〜59
  const index = sec % icons.length;

  document.getElementById("iconBox").innerHTML = icons[index];
</script>

</body>
</html>
